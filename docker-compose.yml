services:
  db:
    image: postgres:16-alpine
    container_name: mini_lms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_lms
    ports:
      - '5432:5432'
    volumes:
      - lms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mini_lms']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: mini_lms_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mini_lms?schema=public
      JWT_SECRET: change_me_to_a_long_random_secret
      JWT_EXPIRES_IN: 1d
      BCRYPT_SALT_ROUNDS: 10
    ports:
      - '3000:3000'

volumes:
  lms_pgdata:
